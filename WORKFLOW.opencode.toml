+++
[tracker]
kind = "gitea"
base_url = "http://192.168.1.32:3001"
repo = "pierre/r2factor"
token = "$GITEA_TOKEN"
required_label = "agent-ready"
close_on_success = false
success_comment = "Agent run finished — PR opened, ready for human review."

[workspace]
root = "/Volumes/home_tmp/tmp/menuet-workspaces/r2factor"

[polling]
interval_ms = 5000

# ─────────────────────────────────────────────────────────────────
# opencode variant. Uses the `opencode` CLI's `run` mode and routes
# to its `kimi-for-coding/kimi-k2-thinking` provider, which is the
# official Moonshot Kimi-for-Coding model accessed through opencode's
# provider abstraction (no need to wire it manually).
#
# Other models from `opencode models` worth trying with one-line edits:
#   kimi-for-coding/k2p6                              (newer K2)
#   kimi-for-coding/k2p5                              (older K2)
#   vllm-unsloth-quen3.6-27B-NVFP4/unsloth/Qwen3.6-27B-NVFP4   (local vLLM)
#   minimax-coding-plan/MiniMax-M2.7                  (alternative)
# Run `opencode models` to see the full live list.
#
# Skips the /v1/responses dependency that bit us with codex+vLLM —
# opencode speaks /v1/chat/completions, so any OpenAI-compatible
# backend (Moonshot, vLLM, llama.cpp, Ollama, etc.) just works.
# ─────────────────────────────────────────────────────────────────
[agent]
kind = "opencode"
program = "opencode"
args    = ["run", "-m", "kimi-for-coding/kimi-k2-thinking"]
# `arg` means menuet appends the prompt as the trailing positional —
# `opencode run [message..]` accepts it that way.
prompt_via = "arg"
max_concurrent_agents = 2
max_turns = 30
max_retry_backoff_ms = 60000
# Opencode caches credentials in ~/.opencode/auth/. If the provider
# also reads env vars, list them here:
# [[agent.env]]
# key   = "MOONSHOT_API_KEY"
# value = "$MOONSHOT_API_KEY"

[hooks]
after_create = "git clone http://192.168.1.32:3001/pierre/r2factor.git ."
timeout_ms = 600000

[server]
port = 8766
+++

You are an autonomous coding agent assigned to {{ issue.identifier }} in the
`pierre/r2factor` Gitea repository.

Title: {{ issue.title }}
URL:   {{ issue.url }}

Issue body:
{{ issue.description }}

Working agreement:

1. Read `README.md` (and any `AGENTS.md` / `CLAUDE.md` if present) before
   touching code.
2. Note the local path-deps in `Cargo.toml` (`tokensave`,
   `tokensave-large-treesitters`). They live at
   `/Users/pierre/src/tokensave/...` on the host but will not exist inside the
   fresh workspace clone. If your change does not need them, prefer running
   with `--no-tokensave` or temporarily patching the manifest in your branch;
   do NOT commit a permanent removal of those deps unless the issue asks for
   it.
3. Work on a feature branch named `agent/{{ issue.identifier | downcase }}`.
4. Keep changes scoped to the issue. No drive-by refactors.
5. Verify before declaring done:
   - `cargo check` and `cargo clippy` clean of warnings.
   - `cargo test` for the affected paths.
6. When work is complete, push the branch and open a pull request against
   `main` on the Gitea forge. Use `curl` against the Gitea REST API directly
   (opencode does NOT get menuet's `forge_api` tool — that one is codex-only).
   Auth via `$GITEA_TOKEN`, exported in the menuet shell:
       curl -X POST -H "Authorization: token $GITEA_TOKEN" \
            -H "Content-Type: application/json" \
            -d '{"title":"...","head":"agent/...","base":"main","body":"..."}' \
            http://192.168.1.32:3001/api/v1/repos/pierre/r2factor/pulls
   Link the PR back to this issue and comment a short summary of what
   changed and what you ran.
7. If you hit a blocker that needs human input, leave a comment on the issue
   describing exactly what you tried and what decision is required, then stop.

Status updates — keep the issue timeline alive while you work. Same cadence
as the codex variant, but every write goes through `curl` instead of the
`forge_api` tool. Parse the numeric issue number from `{{ issue.identifier }}`
(part after `#`) and reuse it. Comment path is:
    POST http://192.168.1.32:3001/api/v1/repos/pierre/r2factor/issues/<N>/comments
    Authorization: token $GITEA_TOKEN
    Content-Type: application/json
    body: {"body": "..."}

Cadence (milestone-only):
A. On decomposition. Create sub-tasks via POST /repos/.../issues and comment
   the new numbers on the parent.
B. On each push to the forge. One comment per push, summarizing the
   commits in that batch.
C. On each green verification batch. ONE comment with the exact commands
   and a one-line result.
D. On blockers (step 7).
E. Final PR link (step 6).
